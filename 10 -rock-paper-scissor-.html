<html>
  <head>
    <title>
      ROCK - PAPER - SCISSOR /GAME/
    </title>
   <style>
    body{
      background-color : rgb(25,25,25);
      color : white;
      font-family : Arial;
    }
    .title2{
      font-family : Arial;
      font-size : 30px;
      font-weight : bold;
    }
    .rock_img{
      height : 50px;
    }
    
      .scissors_img{
      height : 50px;
    }
      .paper_img{
      height : 50px;
    }

    .style_icons{
      height : 120px;
      width : 120px;
      background-color  : transparent;
      border : 3px solid white;
      border-radius : 60px;
      margin-right : 10px;
      cursor : pointer;
    }

    .reset_score{
      background-color : white;
      border : none;
      font-size : 15px;
      padding : 8px 15px;
      cursor : pointer;
      
    }

    .result{
      font-size : 25px;
      font-weight  : bold;
      margin-top : 50px;
    }

    .move_icons{
      height : 50px;
     
    }
    .js-score{
      margin-top : 50px
    }



   </style>
  </head>
  <body>
    <p class = 'title2'>
      Rock Paper Scissors
    </p>
    <button
    onclick = "
    playgame('rock');

    "  class = 'style_icons'>
      <img src = "images/rock-emoji.png" class = "rock_img">
    </button>


    <button
    onclick = "
      playgame('scissors');
  
    "  class = 'style_icons'>
      <img src = "images/scissors-emoji.png " class = "scissors_img">
    </button>

    <button onclick = 
    "
     playgame('paper');

    " class = 'style_icons'>
      <img src = "images/paper-emoji.png" class = "paper_img">
    </button>
    <p class = 'js-result result'> You win.</p>   
    <p class = 'js-moves'>
      
    </p>
     <p class = 'js-score '></p>

    <button
    onclick ="
    score.wins = 0;
    score.losses = 0;
    score.ties = 0;
    localStorage.removeItem('score');
    update_score_element();
    
    " class = "reset_score">
      Reset Score
    </button>
           
      
    
    <script>

    

      let score = JSON.parse(localStorage.getItem('score'))||
      {
        wins: 0,
        losses: 0,
        ties: 0
        };

      /*if (!score) {
        score = {
          wins: 0,
          losses: 0,
          ties: 0
        };
      }*/
     

      update_score_element();
       

      function playgame(playermove){
        const computermove = pickacomputermove();
     let result = '';

     if(playermove === 'paper'){
          if (computermove === 'rock')
            {
              result = 'win';
            }else if (computermove  === 'scissors')
            {
              result = 'loss';
            }else if (computermove === 'paper')
            {
              result = 'tie';
            }
    
    
       }
     else if(playermove === 'rock'){
          if (computermove === 'rock')
            {
              result = 'tie';
            }else if (computermove  === 'scissors')
            {
              result = 'win';
            }else if (computermove === 'paper')
            {
              result = 'loss';
            }
    
    
       }
    else if (playermove ==='scissors')
       {
        
          if (computermove === 'rock')
            {
              result = 'loss';
            }else if (computermove  === 'scissors')
            {
              result = 'tie';
            }else if (computermove === 'paper')
            {
              result = 'win';
            }
       }

    
      if (result === 'win'){
        score.wins += 1;

      }
      else if (result === 'loss'){
        score.losses += 1;
      }
      
      else if (result === 'tie')
      {
        score.ties += 1;
      }

      localStorage.setItem('score',JSON.stringify(score))
      update_score_element();
    
       
     document.querySelector('.js-result').innerHTML = `you ${result} .`;
     document.querySelector('.js-moves').innerHTML =  `You
      <img src = "images/${playermove}-emoji.png" class = 'move_icons' >
      <img src = "images/${computermove}-emoji.png" class = 'move_icons '>
      
      Computer`;
     
//      alert(`you picked ${playermove} . computer  ${computermove} __ result__ ${result}

// wins :  ${score.wins} , losses : ${score.losses} , ties ${score.ties}
//       `)
    
       }

      function update_score_element(){
        document.querySelector('.js-score')
       .innerHTML =`Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;


      }
      function pickacomputermove(){
         const random_no = Math.random();

       let computermove = '';
    if (random_no >= 0 && random_no <= 1/3)

    {
      computermove = 'rock';
    }else if (random_no >= 1/3 && random_no < 2/3  )
    {
      computermove = 'paper';
    }else if (random_no >= 2/3 && random_no  < 1)
    {
      
      computermove = 'scissors';
  }
  return computermove;

}
    </script>
  </body>
</html>
